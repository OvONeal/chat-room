<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>聊天站</title>
  <style>
    :root{
      --bg1:#0f172a; --bg2:#111827; --card:rgba(17,24,39,.72);
      --stroke:rgba(255,255,255,.10); --text:#e5e7eb; --muted:#9ca3af;
      --accent1:#60a5fa; --accent2:#8b5cf6;
      --bubble1:#24324a; --bubble2:#30435f; --green:#22c55e;
      --self-grad:linear-gradient(180deg,#1d4ed8,#7c3aed);
      --msg-grad:linear-gradient(180deg,var(--bubble2),var(--bubble1));
    }
    [data-theme="night"] {
      --bg1:#0f172a; --bg2:#111827; --card:rgba(17,24,39,.72);
      --stroke:rgba(255,255,255,.10); --text:#e5e7eb; --muted:#9ca3af;
      --bubble1:#24324a; --bubble2:#30435f;
      --body-bg: radial-gradient(circle at top left, #1d4ed8 0%, transparent 35%),
        radial-gradient(circle at top right, #7c3aed 0%, transparent 30%),
        linear-gradient(180deg, #050816, var(--bg1) 40%, #020617);
    }
    [data-theme="bright"] {
      --bg1:#f8fafc; --bg2:#f1f5f9; --card:rgba(255,255,255,.9);
      --stroke:rgba(0,0,0,.08); --text:#1e293b; --muted:#64748b;
      --bubble1:#dbeafe; --bubble2:#bfdbfe;
      --self-grad:linear-gradient(180deg,#3b82f6,#8b5cf6);
      --msg-grad:linear-gradient(180deg,#e0e7ff,#dbeafe);
      --body-bg: linear-gradient(135deg, #fef3c7 0%, #fce7f3 50%, #e0e7ff 100%);
    }
    [data-theme="warm"] {
      --bg1:#fff7ed; --bg2:#ffedd5; --card:rgba(255,247,237,.9);
      --stroke:rgba(0,0,0,.08); --text:#431407; --muted:#9a3412;
      --bubble1:#fed7aa; --bubble2:#fdba74;
      --self-grad:linear-gradient(180deg,#ea580c,#f59e0b);
      --msg-grad:linear-gradient(180deg,#ffedd5,#fed7aa);
      --body-bg: linear-gradient(135deg, #fef3c7, #fed7aa, #fecaca);
    }
    [data-theme="forest"] {
      --bg1:#064e3b; --bg2:#065f46; --card:rgba(6,78,59,.75);
      --stroke:rgba(255,255,255,.10); --text:#d1fae5; --muted:#6ee7b7;
      --bubble1:#065f46; --bubble2:#047857;
      --self-grad:linear-gradient(180deg,#059669,#10b981);
      --msg-grad:linear-gradient(180deg,#047857,#065f46);
      --body-bg: radial-gradient(circle at top left, #10b981 0%, transparent 35%),
        radial-gradient(circle at top right, #34d399 0%, transparent 30%),
        linear-gradient(180deg, #022c22, var(--bg1) 40%, #011c16);
    }
    [data-theme="ocean"] {
      --bg1:#0c4a6e; --bg2:#075985; --card:rgba(12,74,110,.75);
      --stroke:rgba(255,255,255,.10); --text:#e0f2fe; --muted:#7dd3fc;
      --bubble1:#075985; --bubble2:#0369a1;
      --self-grad:linear-gradient(180deg,#0284c7,#0ea5e9);
      --msg-grad:linear-gradient(180deg,#0369a1,#075985);
      --body-bg: radial-gradient(circle at top left, #0ea5e9 0%, transparent 35%),
        radial-gradient(circle at top right, #38bdf8 0%, transparent 30%),
        linear-gradient(180deg, #082f49, var(--bg1) 40%, #0c4a6e);
    }
    [data-theme="purple"] {
      --bg1:#4c1d95; --bg2:#5b21b6; --card:rgba(76,29,149,.75);
      --stroke:rgba(255,255,255,.10); --text:#ede9fe; --muted:#c4b5fd;
      --bubble1:#5b21b6; --bubble2:#6d28d9;
      --self-grad:linear-gradient(180deg,#7c3aed,#a855f7);
      --msg-grad:linear-gradient(180deg,#6d28d9,#5b21b6);
      --body-bg: radial-gradient(circle at top left, #a855f7 0%, transparent 35%),
        radial-gradient(circle at top right, #c084fc 0%, transparent 30%),
        linear-gradient(180deg, #2e1065, var(--bg1) 40%, #4c1d95);
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:Arial, sans-serif; color:var(--text);
      min-height:100vh; display:flex; justify-content:center; align-items:center;
      background: var(--body-bg);
      transition: background 0.5s ease;
    }
    .card{
      width:min(1100px, 94vw); height:min(760px, 92vh);
      background:var(--card); border:1px solid var(--stroke);
      border-radius:28px; box-shadow:0 25px 80px rgba(0,0,0,.5);
      backdrop-filter: blur(18px); padding:20px;
      transition: all 0.5s ease;
    }
    .top{
      display:flex; justify-content:space-between; align-items:center;
      gap:10px; margin-bottom:16px; flex-wrap:wrap;
    }
    .pill{
      background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.08);
      border-radius:999px; padding:10px 14px; display:inline-flex;
      align-items:center; gap:8px; color:var(--text); font-size:14px;
    }
    .dot{
      width:12px; height:12px; border-radius:50%;
      background:linear-gradient(135deg,#fb7185,#f59e0b);
      box-shadow:0 0 18px rgba(245,158,11,.45); display:inline-block;
    }
    .layout{
      display:grid; grid-template-columns: 1.6fr .75fr;
      gap:16px; height:calc(100% - 58px);
    }
    .panel{
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07);
      border-radius:22px; padding:16px; overflow:hidden;
    }
    #loginBox, #adminForm {max-width:520px}
    #chatBox{display:none}
    input,button,select{
      width:100%; border:none; outline:none; border-radius:14px;
      padding:12px 14px; font-size:16px; margin-top:10px;
    }
    input,select{
      background:rgba(255,255,255,.08); color:var(--text);
    }
    input::placeholder{color:#cbd5e1}
    button{
      cursor:pointer; color:white; font-weight:700;
      background:linear-gradient(90deg,var(--accent1),var(--accent2));
      transition:.15s transform ease;
    }
    button:hover{transform:translateY(-1px)}
    .small{font-size:13px;color:var(--muted)}
    #messages{
      height:calc(100% - 110px); overflow:auto; padding-right:4px;
    }
    .msg,.system,.self{
      margin:10px 0; padding:10px 12px; border-radius:14px;
      line-height:1.45; max-width:70%; min-width:0;
      word-break:break-word; overflow-wrap:break-word; box-sizing:border-box;
    }
    .msg{background:var(--msg-grad); align-self:flex-start;}
    .self{background:var(--self-grad); margin-left:auto; align-self:flex-end;}
    .system{
      background:rgba(34,197,94,.14); color:#bbf7d0;
      max-width:100%; text-align:center; font-size:13px;
    }
    .meta{font-size:12px; opacity:.8; margin-bottom:4px;}
    .chatBottom{
      display:grid; grid-template-columns: 1fr auto auto;
      gap:10px; margin-top:12px; align-items:center;
    }
    .file-btn{
      width:auto; padding:12px 16px;
      background:linear-gradient(90deg,#f59e0b,#ec4899); white-space:nowrap;
    }
    .users .user{
      background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.06);
      border-radius:14px; padding:10px 12px; margin-top:10px;
      display:flex; align-items:center; gap:10px;
      max-width:100%; overflow:hidden;
    }
    .avatar{
      width:28px; height:28px; border-radius:50%;
      display:inline-flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,#f59e0b,#ec4899);
      flex:0 0 auto; font-size:16px;
    }
    .hidden{display:none !important}
    .sectionTitle{margin:0 0 8px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .room-grid{
      display:grid; grid-template-columns:repeat(5,1fr);
      gap:8px; margin:10px 0;
    }
    .room-btn{
      padding:10px; border-radius:12px;
      background:rgba(255,255,255,.08); border:2px solid transparent;
      cursor:pointer; text-align:center; font-size:14px;
      color:var(--text); transition:all .2s;
    }
    .room-btn:hover{border-color:var(--accent1)}
    .room-btn.active{
      border-color:var(--accent2);
      background:linear-gradient(90deg,var(--accent1),var(--accent2));
      color:white;
    }
    .theme-grid{
      display:grid; grid-template-columns:repeat(3,1fr);
      gap:8px; margin:10px 0;
    }
    .theme-btn{
      padding:8px; border-radius:10px; border:2px solid transparent;
      cursor:pointer; text-align:center; font-size:13px; transition:all .2s;
    }
    .theme-btn:hover{transform:scale(1.05)}
    .theme-btn.active{border-color:white;box-shadow:0 0 10px rgba(255,255,255,.3)}
    .file-msg{
      display:flex; align-items:center; gap:8px;
      padding:8px; background:rgba(255,255,255,.1);
      border-radius:10px; margin-top:6px;
    }
    .file-msg a{color:var(--accent1); text-decoration:none;}
    .file-msg a:hover{text-decoration:underline}
    .img-msg{
      max-width:100%; max-height:200px; border-radius:10px;
      margin-top:6px; cursor:pointer;
    }
    #messages::-webkit-scrollbar{width:6px}
    #messages::-webkit-scrollbar-track{background:transparent}
    #messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:3px}
    @media(max-width:768px){
      .layout{grid-template-columns:1fr}
      .users-panel{display:none}
      .room-grid{grid-template-columns:repeat(3,1fr)}
      .msg,.self{max-width:85%}
    }
  </style>
<base target="_blank">
</head>
<body data-theme="night">
  <div class="card">
    <div id="loginBox" class="panel">
      <h1>欢迎来到聊天站</h1>
      <div class="grid2">
        <input id="nameInput" placeholder="昵称" />
        <select id="avatarInput">
          <option value="🌟">🌟 星星</option>
          <option value="🔥">🔥 火焰</option>
          <option value="🍀">🍀 幸运草</option>
          <option value="😎">😎 酷酷</option>
          <option value="🎮">🎮 游戏</option>
          <option value="🐱">🐱 猫咪</option>
          <option value="🐶">🐶 狗狗</option>
          <option value="🦄">🦄 独角兽</option>
          <option value="🚀">🚀 火箭</option>
          <option value="🌈">🌈 彩虹</option>
          <option value="⚡">⚡ 闪电</option>
          <option value="🍕">🍕 披萨</option>
          <option value="🎵">🎵 音乐</option>
          <option value="🎨">🎨 画家</option>
          <option value="📚">📚 书虫</option>
        </select>
      </div>
      <input id="keyInput" placeholder="输入密钥" />
      <p style="margin:8px 0 4px;font-size:14px;color:var(--muted)">选择聊天室：</p>
      <div class="room-grid" id="roomGrid"></div>
      <p style="margin:8px 0 4px;font-size:14px;color:var(--muted)">选择主题：</p>
      <div class="theme-grid" id="themeGrid"></div>
      <button onclick="checkKey()">进入聊天室</button>
      <p id="loginMsg" class="small"></p>
      <button onclick="toggleAdmin()" style="margin-top:20px;background:linear-gradient(90deg,#64748b,#94a3b8)">修改密钥</button>
      <div id="adminForm" class="hidden">
        <input id="adminCode" placeholder="管理员密码" />
        <input id="oldKey" placeholder="旧密钥" />
        <input id="newKey" placeholder="新密钥" />
        <select id="keyType">
          <option value="permanent">永久性密钥</option>
          <option value="one-time">一次性密钥</option>
        </select>
        <button onclick="changeKey()">确认修改</button>
        <p id="adminMsg" class="small"></p>
      </div>
    </div>

    <div id="chatBox">
      <div class="top">
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <div class="pill"><span class="dot"></span><span id="myName"></span> · <span id="myAvatar"></span></div>
          <div class="pill" id="roomPill">🏠 大厅</div>
          <div class="pill" id="themePill" style="cursor:pointer" onclick="showThemePicker()">🎨 主题</div>
        </div>
        <div style="display:flex;gap:10px">
          <div class="pill">状态：在线</div>
          <button onclick="leaveRoom()" style="width:auto;padding:8px 16px;font-size:13px;background:linear-gradient(90deg,#ef4444,#f97316)">退出</button>
        </div>
      </div>
      <div class="layout">
        <div class="panel">
          <div id="messages"></div>
          <div class="chatBottom">
            <input id="msgInput" placeholder="输入消息，按回车发送..." />
            <button class="file-btn" onclick="document.getElementById('fileInput').click()">📎 文件</button>
            <input type="file" id="fileInput" class="hidden" onchange="sendFile(this)" />
            <button onclick="sendMsg()">发送</button>
          </div>
        </div>
        <div class="panel users users-panel">
          <h3 class="sectionTitle">在线用户</h3>
          <div id="users"></div>
        </div>
      </div>
    </div>

    <div id="themeModal" onclick="if(event.target===this)hideThemePicker()" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:none;justify-content:center;align-items:center;z-index:100">
      <div style="background:var(--card);padding:24px;border-radius:20px;max-width:400px;width:90%;border:1px solid var(--stroke)">
        <h3 style="margin-top:0">切换主题</h3>
        <div class="theme-grid" id="themeModalGrid"></div>
        <button onclick="hideThemePicker()" style="margin-top:16px">关闭</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script>
    const SERVER_URL = window.location.origin;
    console.log("服务器地址:", SERVER_URL);

    let socket;
    try {
      socket = io(SERVER_URL);
      console.log("Socket.io 连接成功");
    } catch(e) {
      console.error("Socket.io 连接失败:", e);
    }

    const ROOMS = [
      {id:"lobby",name:"🏠 大厅"},{id:"game",name:"🎮 游戏房"},
      {id:"study",name:"📚 学习室"},{id:"music",name:"🎵 音乐吧"},
      {id:"food",name:"🍕 美食街"},{id:"anime",name:"🎨 二次元"},
      {id:"tech",name:"💻 技术区"},{id:"pets",name:"🐱 萌宠园"},
      {id:"sports",name:"⚽ 运动场"},{id:"random",name:"🎲 随机聊"}
    ];
    const THEMES = [
      {id:"night",name:"🌙 夜间",color:"#0f172a"},
      {id:"bright",name:"☀️ 明亮",color:"#f8fafc"},
      {id:"warm",name:"🔥 温和",color:"#fff7ed"},
      {id:"forest",name:"🌲 森林",color:"#064e3b"},
      {id:"ocean",name:"🌊 海洋",color:"#0c4a6e"},
      {id:"purple",name:"💜 紫色",color:"#4c1d95"}
    ];

    let currentRoom = "lobby";
    let currentTheme = "night";

    function initRooms(){
      const grid = document.getElementById("roomGrid");
      if(!grid){console.error("roomGrid 不存在");return;}
      grid.innerHTML = "";
      ROOMS.forEach(r=>{
        const btn = document.createElement("div");
        btn.className = "room-btn" + (r.id===currentRoom?" active":"");
        btn.innerText = r.name;
        btn.onclick = ()=>{currentRoom=r.id;updateRoomButtons();};
        grid.appendChild(btn);
      });
    }
    function updateRoomButtons(){
      document.querySelectorAll(".room-btn").forEach((btn,i)=>{
        btn.classList.toggle("active",ROOMS[i].id===currentRoom);
      });
    }

    function initThemes(){
      const grid = document.getElementById("themeGrid");
      const modalGrid = document.getElementById("themeModalGrid");
      [grid,modalGrid].forEach(g=>{
        if(!g)return;
        g.innerHTML = "";
        THEMES.forEach(t=>{
          const btn = document.createElement("div");
          btn.className = "theme-btn" + (t.id===currentTheme?" active":"");
          btn.style.background = t.color;
          btn.style.color = t.id==="bright"||t.id==="warm"?"#333":"#fff";
          btn.innerText = t.name;
          btn.onclick = ()=>{setTheme(t.id);hideThemePicker();};
          g.appendChild(btn);
        });
      });
    }
    function setTheme(id){
      currentTheme = id;
      document.body.setAttribute("data-theme",id);
      initThemes();
    }
    function showThemePicker(){
      const modal = document.getElementById("themeModal");
      if(modal) modal.style.display = "flex";
    }
    function hideThemePicker(){
      const modal = document.getElementById("themeModal");
      if(modal) modal.style.display = "none";
    }

    // 页面加载完成后初始化
    document.addEventListener("DOMContentLoaded", function(){
      console.log("页面加载完成，开始初始化...");
      initRooms();
      initThemes();
      console.log("初始化完成");
    });

    function toggleAdmin(){
      const form = document.getElementById("adminForm");
      if(form) form.classList.toggle("hidden");
    }

    async function checkKey(){
      console.log("checkKey 被调用");
      const keyInput = document.getElementById("keyInput");
      const nameInput = document.getElementById("nameInput");
      const avatarInput = document.getElementById("avatarInput");
      const loginMsg = document.getElementById("loginMsg");

      if(!keyInput || !nameInput || !avatarInput){
        console.error("找不到输入框元素");
        return;
      }

      const key = keyInput.value.trim();
      const name = nameInput.value.trim() || "匿名";
      const avatar = avatarInput.value;
      const room = currentRoom;

      console.log("验证密钥:", {key, name, avatar, room});

      if(!key){
        loginMsg.innerText = "请输入密钥";
        return;
      }

      loginMsg.innerText = "正在验证...";

      try {
        const res = await fetch(SERVER_URL + "/api/verify-key",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({key:key})
        });

        console.log("响应状态:", res.status);

        if(!res.ok){
          loginMsg.innerText = "服务器错误: " + res.status;
          return;
        }

        const data = await res.json();
        console.log("验证结果:", data);
        loginMsg.innerText = data.message || "";

        if(data.ok){
          window.myName = name;
          window.myAvatar = avatar;
          window.myRoom = room;

          document.getElementById("myName").innerText = name;
          document.getElementById("myAvatar").innerText = avatar;
          const roomPill = document.getElementById("roomPill");
          if(roomPill) roomPill.innerText = ROOMS.find(r=>r.id===room)?.name || room;

          document.getElementById("loginBox").style.display = "none";
          document.getElementById("chatBox").style.display = "block";

          if(socket) socket.emit("join",{name,avatar,room});
        }
      } catch(err) {
        console.error("验证失败:", err);
        loginMsg.innerText = "网络错误: " + err.message;
      }
    }

    async function changeKey(){
      const adminCode = document.getElementById("adminCode")?.value.trim();
      const oldKey = document.getElementById("oldKey")?.value.trim();
      const newKey = document.getElementById("newKey")?.value.trim();
      const type = document.getElementById("keyType")?.value;
      const adminMsg = document.getElementById("adminMsg");

      if(!adminCode || !oldKey || !newKey){
        if(adminMsg) adminMsg.innerText = "请填写所有字段";
        return;
      }

      try {
        const res = await fetch(SERVER_URL + "/api/admin-change-key",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({adminCode,oldKey,newKey,type})
        });
        const data = await res.json();
        if(adminMsg) adminMsg.innerText = data.message;
      } catch(err) {
        if(adminMsg) adminMsg.innerText = "网络错误";
      }
    }

    function leaveRoom(){
      if(socket) socket.emit("leave",{name:window.myName,room:window.myRoom});
      document.getElementById("chatBox").style.display = "none";
      document.getElementById("loginBox").style.display = "block";
      document.getElementById("messages").innerHTML = "";
      document.getElementById("users").innerHTML = "";
    }

    function sendMsg(){
      const input = document.getElementById("msgInput");
      if(!input) return;
      const text = input.value.trim();
      if(!text) return;

      if(socket) socket.emit("chat message",{
        name:window.myName || "匿名",
        avatar:window.myAvatar || "🌟",
        text,
        room:window.myRoom,
        time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})
      });

      input.value = "";
    }

    async function sendFile(input){
      const file = input.files[0];
      if(!file) return;

      const reader = new FileReader();
      reader.onload = (e)=>{
        const base64 = e.target.result;
        const ext = file.name.split(".").pop().toLowerCase();

        if(socket) socket.emit("file message",{
          name:window.myName || "匿名",
          avatar:window.myAvatar || "🌟",
          fileName:file.name,
          fileData:base64,
          fileType:file.type,
          fileExt:ext,
          room:window.myRoom,
          time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})
        });
      };
      reader.readAsDataURL(file);
      input.value = "";
    }

    document.addEventListener("keydown",(e)=>{
      if(e.key === "Enter" && document.activeElement.id === "msgInput"){
        sendMsg();
      }
    });

    if(socket){
      socket.on("chat message",(data)=>{
        if(data.room !== window.myRoom) return;
        const div = document.createElement("div");
        div.className = data.name === window.myName ? "self" : "msg";
        div.innerHTML = `<div class="meta">${data.avatar || "🌟"} ${data.name} · ${data.time || ""}</div><div>${escapeHtml(data.text)}</div>`;
        appendMsg(div);
      });

      socket.on("file message",(data)=>{
        if(data.room !== window.myRoom) return;
        const div = document.createElement("div");
        div.className = data.name === window.myName ? "self" : "msg";
        let content = "";
        const ext = data.fileExt || "";
        if(["jpg","jpeg","png","gif","webp","bmp","svg"].includes(ext)){
          content = `<img src="${data.fileData}" class="img-msg" onclick="window.open(this.src)" alt="${escapeHtml(data.fileName)}"/>`;
        } else if(["txt","js","html","css","json","md","py","java","cpp","c","h","xml","yaml","yml"].includes(ext)){
          content = `<div class="file-msg">📄 <a href="${data.fileData}" download="${escapeHtml(data.fileName)}">${escapeHtml(data.fileName)}</a> <span style="font-size:12px;color:var(--muted)">(点击下载)</span></div>`;
        } else if(["doc","docx"].includes(ext)){
          content = `<div class="file-msg">📘 <a href="${data.fileData}" download="${escapeHtml(data.fileName)}">${escapeHtml(data.fileName)}</a> <span style="font-size:12px;color:var(--muted)">(Word文档)</span></div>`;
        } else {
          content = `<div class="file-msg">📎 <a href="${data.fileData}" download="${escapeHtml(data.fileName)}">${escapeHtml(data.fileName)}</a> <span style="font-size:12px;color:var(--muted)">(点击下载)</span></div>`;
        }
        div.innerHTML = `<div class="meta">${data.avatar || "🌟"} ${data.name} · ${data.time || ""}</div>${content}`;
        appendMsg(div);
      });

      socket.on("system",(data)=>{
        if(typeof data === "string"){
          const div = document.createElement("div");
          div.className = "system";
          div.innerText = data;
          appendMsg(div);
        } else if(data.room === window.myRoom){
          const div = document.createElement("div");
          div.className = "system";
          div.innerText = data.text;
          appendMsg(div);
        }
      });

      socket.on("users",(list)=>{
        const box = document.getElementById("users");
        if(!box) return;
        box.innerHTML = "";
        list.filter(u=>u.room===window.myRoom).forEach(u=>{
          const div = document.createElement("div");
          div.className = "user";
          div.innerHTML = `<span class="avatar">${u.avatar || "🌟"}</span><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.name}</div>`;
          box.appendChild(div);
        });
      });
    }

    function appendMsg(div){
      const messages = document.getElementById("messages");
      if(messages){
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }
    }

    function escapeHtml(text){
      const div = document.createElement("div");
      div.innerText = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
